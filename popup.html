<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalStorage Manager</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-width: 320px;
      background: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #1f2937;
    }

    body {
      width: 360px;
      max-width: 100vw;
      padding: 16px;
    }

    .app {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      padding: 16px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 600;
      color: #111827;
      text-align: center;
    }

    .button-container {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      height: 38px;
      padding: 0 12px;
      border: 1px solid #1677ff;
      border-radius: 4px;
      background: #1677ff;
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }

    button:hover {
      background: #4096ff;
      border-color: #4096ff;
    }

    button:active {
      background: #0958d9;
      border-color: #0958d9;
      transform: translateY(1px);
    }

    button:focus-visible {
      outline: 3px solid rgba(22, 119, 255, 0.22);
      outline-offset: 1px;
    }

    button.secondary {
      background: #ffffff;
      color: #1677ff;
    }

    button.secondary:hover {
      background: #f0f7ff;
      color: #0958d9;
    }

    button.danger {
      background: #ffffff;
      border-color: #ff4d4f;
      color: #cf1322;
    }

    button.danger:hover {
      background: #fff1f0;
      border-color: #ff7875;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 10px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      background: #ffffff;
      color: #111827;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    textarea:hover {
      border-color: #4096ff;
    }

    textarea:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.14);
      outline: none;
    }

    .footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
    }

    .footer a {
      color: #1677ff;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      color: #0958d9;
      text-decoration: underline;
    }

    @media (max-width: 340px) {
      body {
        padding: 10px;
      }

      .app {
        padding: 12px;
      }

      .button-container {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>LocalStorage Manager</h1>

    <div class="button-container">
      <button id="export">Export</button>
      <button id="import" class="secondary">Import</button>
      <button id="copy" class="secondary">Copy</button>
      <button id="clear" class="danger">Clear</button>
      <button id="download">Download</button>
      <button id="reload" class="secondary">Reload Page</button>
    </div>

    <textarea id="localStorageData" placeholder="LocalStorage data will appear here..."></textarea>

    <div class="footer">
      Extension Created By <a href="#" target="_blank" rel="noopener noreferrer">hoangancoder</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
